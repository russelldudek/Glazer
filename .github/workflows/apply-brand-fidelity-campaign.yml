name: Apply RoleForge Brand Fidelity campaign

on:
  push:
    paths:
      - 'campaign-payload.part07'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-campaign:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decode approved campaign source
        shell: bash
        run: |
          set -euo pipefail
          cat campaign-payload.part{01..07} | base64 --decode > /tmp/roleforge-campaign.tar.gz
          tar -xzf /tmp/roleforge-campaign.tar.gz -C .
          test -s index.html
          test -s brand-tokens.css
          test -s brand-intelligence.md
          test -s assets/brand/southern-glazers-logo-secondary.svg
          test -s assets/brand/southern-glazers-logo-secondary-mobile.svg

      - name: Generate and validate branded PDFs
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pdfinfo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils
          fi
          CHROME="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$CHROME"
          mkdir -p docs
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/roleforge-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for attempt in {1..20}; do
            curl -fsS http://127.0.0.1:8765/index.html >/dev/null && break
            sleep 1
          done
          render_pdf() {
            local route="$1"
            local output="$2"
            "$CHROME" --headless --no-sandbox --disable-gpu --disable-dev-shm-usage \
              --no-pdf-header-footer --print-to-pdf="$PWD/docs/$output" \
              "http://127.0.0.1:8765/$route"
            test -s "docs/$output"
          }
          render_pdf resume.html Russell-Dudek-SGWS-AIML-Resume.pdf
          render_pdf cover-letter.html Russell-Dudek-SGWS-AIML-Cover-Letter.pdf
          render_pdf interview-brief.html Russell-Dudek-SGWS-AIML-Interview-Brief.pdf
          render_pdf 120-day-plan.html Russell-Dudek-SGWS-AIML-120-Day-Plan.pdf
          render_pdf reliability-contract.html Model-Reliability-Contract.pdf
          test "$(pdfinfo docs/Russell-Dudek-SGWS-AIML-Resume.pdf | awk '/^Pages:/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-SGWS-AIML-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = "1"
          test "$(pdfinfo docs/Russell-Dudek-SGWS-AIML-Interview-Brief.pdf | awk '/^Pages:/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-SGWS-AIML-120-Day-Plan.pdf | awk '/^Pages:/ {print $2}')" = "2"
          test "$(pdfinfo docs/Model-Reliability-Contract.pdf | awk '/^Pages:/ {print $2}')" = "1"

      - name: Refresh committed PDF audit metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, subprocess
          from pathlib import Path
          files = {
              'resume': Path('docs/Russell-Dudek-SGWS-AIML-Resume.pdf'),
              'cover_letter': Path('docs/Russell-Dudek-SGWS-AIML-Cover-Letter.pdf'),
              'interview_brief': Path('docs/Russell-Dudek-SGWS-AIML-Interview-Brief.pdf'),
              'entry_plan': Path('docs/Russell-Dudek-SGWS-AIML-120-Day-Plan.pdf'),
              'reliability_contract': Path('docs/Model-Reliability-Contract.pdf'),
          }
          evidence_path = Path('audit-evidence.json')
          evidence = json.loads(evidence_path.read_text())
          pdfs = {}
          for key, path in files.items():
              info = subprocess.check_output(['pdfinfo', str(path)], text=True)
              pages = int(next(line.split(':', 1)[1].strip() for line in info.splitlines() if line.startswith('Pages:')))
              data = path.read_bytes()
              pdfs[key] = {
                  'path': str(path),
                  'pages': pages,
                  'bytes': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
                  'generated_on': 'GitHub Actions from audited main source'
              }
          evidence['committed_pdfs'] = pdfs
          evidence_path.write_text(json.dumps(evidence, indent=2) + '\n')
          PY

      - name: Commit complete branded campaign to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f campaign-payload.part{01..07} .github/workflows/apply-brand-fidelity-campaign.yml
          git add index.html resume.html cover-letter.html interview-brief.html 120-day-plan.html reliability-contract.html \
            brand-tokens.css styles.css documents.css app.js brand-intelligence.md campaign-metadata.json \
            artifact-manifest.json alignment-audit.md brand-fidelity-audit.md campaign-completion-audit.md \
            audit-evidence.json README.md docs assets/brand
          git commit -m "Apply RoleForge Brand Fidelity repair"
          git push origin main
