name: Apply approved contact and site update

on:
  push:
    paths:
      - 'apply-contact-update.trigger'

permissions:
  contents: write

jobs:
  update-documents:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply approved contact and candidate-site treatment
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          contact = '<div class="doc-contact" aria-label="Contact information"><span>Pittsburgh, Pennsylvania</span><a href="tel:+14122878640">412.287.8640</a><a href="mailto:russelldudek@gmail.com">russelldudek@gmail.com</a><a href="https://www.linkedin.com/in/russelldudek">linkedin.com/in/russelldudek</a><a href="https://russelldudek.github.io/Glazer/">russelldudek.github.io/Glazer/</a></div>'
          continuation = '<div class="doc-continuation-header"><div class="continuation-id"><img alt="Southern Glazer\'s Wine &amp; Spirits official compact logo" src="assets/brand/southern-glazers-logo-secondary-mobile.svg"/><div><b>Russell Dudek</b><small>Southern Glazer\'s AI/ML Product Operations candidate campaign</small></div></div><div class="doc-contact" aria-label="Contact information"><span>Pittsburgh, Pennsylvania</span><a href="tel:+14122878640">412.287.8640</a><a href="mailto:russelldudek@gmail.com">russelldudek@gmail.com</a><a href="https://www.linkedin.com/in/russelldudek">linkedin.com/in/russelldudek</a><a href="https://russelldudek.github.io/Glazer/">russelldudek.github.io/Glazer/</a></div></div>'

          resume_path = Path('resume.html')
          resume = resume_path.read_text()
          old_meta = '<div class="doc-meta">Pittsburgh, Pennsylvania | Candidate vision: index.html</div>'
          assert resume.count(old_meta) == 1, 'resume page-one metadata anchor changed'
          resume = resume.replace(old_meta, contact, 1)

          brand = '<div class="doc-brand"><img alt="Southern Glazer\'s Wine &amp; Spirits official compact logo" src="assets/brand/southern-glazers-logo-secondary-mobile.svg"/><div><span>Independent candidate campaign</span><b>Southern Glazer\'s Wine &amp; Spirits</b><small>Director of Product Operations, Artificial Intelligence and Machine Learning (AI/ML) - Russell Dudek</small></div></div>'
          assert resume.count(brand) == 2, f'expected two resume brand headers, found {resume.count(brand)}'
          first, rest = resume.split(brand, 1)
          middle, last = rest.split(brand, 1)
          resume = first + brand + middle + continuation + last
          resume = resume.replace('Candidate vision: index.html', '<a href="https://russelldudek.github.io/Glazer/">Candidate vision: russelldudek.github.io/Glazer/</a>', 1)
          resume_path.write_text(resume)

          cover_path = Path('cover-letter.html')
          cover = cover_path.read_text()
          old_cover_meta = '<div class="doc-meta">Pittsburgh, Pennsylvania</div>'
          assert cover.count(old_cover_meta) == 1, 'cover-letter metadata anchor changed'
          cover = cover.replace(old_cover_meta, contact, 1)
          thesis = '<p>My candidate thesis is a Model Reliability Contract: every production model should have explicit release evidence, live operating boundaries, named intervention rights, and a business-outcome owner. I have translated it into a Reliability Interlock, a 120-day entry plan, an interview thesis brief, and a practical one-page operating artifact.</p>'
          addition = '<p>I developed a role-specific candidate vision at <a class="inline-link" href="https://russelldudek.github.io/Glazer/">russelldudek.github.io/Glazer/</a> to demonstrate the Reliability Interlock, supporting operating model, and first-120-day approach.</p>'
          assert cover.count(thesis) == 1, 'cover-letter thesis anchor changed'
          cover = cover.replace(thesis, thesis + addition, 1)
          cover_path.write_text(cover)

          css_path = Path('documents.css')
          css = css_path.read_text()
          marker = '/* RoleForge contact and campaign-link treatment */'
          assert marker not in css, 'contact styles already present unexpectedly'
          css += '''

          /* RoleForge contact and campaign-link treatment */
          .doc-contact{display:flex;align-items:center;flex-wrap:wrap;margin-top:4px;font-size:8.1pt;line-height:1.22;color:var(--muted)}
          .doc-contact>*{display:inline-flex;align-items:center;min-width:0}
          .doc-contact>*+*::before{content:"·";margin:0 .42em;color:var(--brand-secondary);font-weight:900}
          .doc-contact a{color:inherit;text-decoration:none;text-underline-offset:2px}
          .doc-contact a:hover,.doc-contact a:focus-visible{color:var(--brand-primary);text-decoration:underline}
          .doc-continuation-header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 0 8px;margin:0 0 8px;border-bottom:1px solid var(--line)}
          .continuation-id{display:flex;align-items:center;gap:8px;min-width:190px}
          .continuation-id img{width:28px;height:28px;flex:none;object-fit:contain}
          .continuation-id b{display:block;font-family:var(--display-font);font-size:10.5pt;line-height:1}
          .continuation-id small{display:block;margin-top:2px;color:var(--muted);font-size:6.8pt;line-height:1.15}
          .doc-continuation-header .doc-contact{justify-content:flex-end;margin:0;max-width:72%;font-size:6.8pt;line-height:1.15}
          .inline-link{color:var(--brand-primary);font-weight:700;text-decoration:underline;text-underline-offset:2px}
          @media(max-width:720px){.doc-contact{align-items:flex-start}.doc-continuation-header{align-items:flex-start;flex-direction:column}.doc-continuation-header .doc-contact{justify-content:flex-start;max-width:100%}}
          @media print{.doc-contact{flex-wrap:nowrap;white-space:nowrap;margin-top:2px;font-size:7.15pt;line-height:1.1}.doc-contact>*+*::before{margin:0 .32em}.doc-continuation-header{gap:10px;padding-bottom:5px;margin-bottom:5px}.doc-continuation-header .doc-contact{max-width:74%;font-size:6.15pt}.continuation-id{min-width:166px}.continuation-id img{width:24px;height:24px}.continuation-id b{font-size:9.2pt}.continuation-id small{font-size:6.1pt}.inline-link{color:inherit;text-decoration:none}}
          '''
          css_path.write_text(css)
          PY

      - name: Run source regression checks
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          resume = Path('resume.html').read_text()
          cover = Path('cover-letter.html').read_text()
          css = Path('documents.css').read_text()
          required = [
              'tel:+14122878640',
              'mailto:russelldudek@gmail.com',
              'https://www.linkedin.com/in/russelldudek',
              'https://russelldudek.github.io/Glazer/'
          ]
          for label, text in [('resume', resume), ('cover letter', cover)]:
              assert 'class="doc-contact"' in text, f'{label}: contact block missing'
              for href in required:
                  assert href in text, f'{label}: missing {href}'
          assert 'class="doc-continuation-header"' in resume, 'resume compact page-two header missing'
          assert resume.count('class="doc-brand"') == 1, 'resume should retain only the page-one full brand header'
          assert 'I developed a role-specific candidate vision at' in cover
          assert 'first-120-day approach' in cover
          assert 'RoleForge contact and campaign-link treatment' in css
          print('Source regression checks passed')
          PY

      - name: Generate and validate affected PDFs
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pdfinfo >/dev/null 2>&1 || ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils
          fi
          CHROME="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$CHROME"
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/glazer-contact-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for attempt in {1..20}; do
            curl -fsS http://127.0.0.1:8765/resume.html >/dev/null && break
            sleep 1
          done
          "$CHROME" --headless --no-sandbox --disable-gpu --disable-dev-shm-usage --no-pdf-header-footer \
            --print-to-pdf="$PWD/docs/Russell-Dudek-SGWS-AIML-Resume.pdf" \
            http://127.0.0.1:8765/resume.html
          "$CHROME" --headless --no-sandbox --disable-gpu --disable-dev-shm-usage --no-pdf-header-footer \
            --print-to-pdf="$PWD/docs/Russell-Dudek-SGWS-AIML-Cover-Letter.pdf" \
            http://127.0.0.1:8765/cover-letter.html
          test "$(pdfinfo docs/Russell-Dudek-SGWS-AIML-Resume.pdf | awk '/^Pages:/ {print $2}')" = "2"
          test "$(pdfinfo docs/Russell-Dudek-SGWS-AIML-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = "1"
          pdftotext -layout docs/Russell-Dudek-SGWS-AIML-Resume.pdf /tmp/resume.txt
          pdftotext -layout docs/Russell-Dudek-SGWS-AIML-Cover-Letter.pdf /tmp/cover.txt
          grep -q '412.287.8640' /tmp/resume.txt
          grep -q 'russelldudek@gmail.com' /tmp/resume.txt
          grep -q 'russelldudek.github.io/Glazer/' /tmp/resume.txt
          grep -q '412.287.8640' /tmp/cover.txt
          grep -q 'russelldudek@gmail.com' /tmp/cover.txt
          grep -q 'russelldudek.github.io/Glazer/' /tmp/cover.txt
          grep -q 'I developed a role-specific candidate vision' /tmp/cover.txt

      - name: Refresh audit evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib, json, subprocess
          root = Path('.')
          evidence_path = root / 'audit-evidence.json'
          evidence = json.loads(evidence_path.read_text())
          files = {
              'resume': root / 'docs/Russell-Dudek-SGWS-AIML-Resume.pdf',
              'cover_letter': root / 'docs/Russell-Dudek-SGWS-AIML-Cover-Letter.pdf',
          }
          for key, path in files.items():
              info = subprocess.check_output(['pdfinfo', str(path)], text=True)
              pages = int(next(line.split(':', 1)[1].strip() for line in info.splitlines() if line.startswith('Pages:')))
              raw = path.read_bytes()
              evidence.setdefault('committed_pdfs', {})[key] = {
                  'path': str(path),
                  'pages': pages,
                  'bytes': len(raw),
                  'sha256': hashlib.sha256(raw).hexdigest(),
                  'generated_on': 'GitHub Actions from audited main source after approved contact/site update'
              }
          evidence['contact_and_site_access'] = {
              'approved_contact_line': 'Pittsburgh, Pennsylvania · 412.287.8640 · russelldudek@gmail.com · linkedin.com/in/russelldudek · russelldudek.github.io/Glazer/',
              'resume_header': 'passed source and PDF checks',
              'resume_page_two_compact_header': 'passed source and PDF checks',
              'cover_letter_header': 'passed source and PDF checks',
              'cover_letter_body_site_reference': 'passed source and PDF checks',
              'active_links': ['tel:+14122878640', 'mailto:russelldudek@gmail.com', 'https://www.linkedin.com/in/russelldudek', 'https://russelldudek.github.io/Glazer/'],
              'resume_pdf_pages': evidence['committed_pdfs']['resume']['pages'],
              'cover_letter_pdf_pages': evidence['committed_pdfs']['cover_letter']['pages']
          }
          evidence_path.write_text(json.dumps(evidence, indent=2) + '\n')
          PY

      - name: Commit approved document update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f apply-contact-update.trigger .github/workflows/apply-contact-site-update.yml
          git add resume.html cover-letter.html documents.css \
            docs/Russell-Dudek-SGWS-AIML-Resume.pdf \
            docs/Russell-Dudek-SGWS-AIML-Cover-Letter.pdf \
            audit-evidence.json
          git commit -m 'Add contact and campaign site access to application documents'
          git push origin main
