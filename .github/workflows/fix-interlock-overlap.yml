name: Apply tested Reliability Interlock repair

on:
  push:
    paths:
      - '.github/workflows/fix-interlock-overlap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply root-cause repair
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          index = Path('index.html')
          html = index.read_text()
          old_path = '<div class="intervention-path"><span>OWNER ACTION</span></div>'
          assert html.count(old_path) == 1, 'Expected one overlapping intervention label'
          html = html.replace(old_path, '')
          index.write_text(html)

          styles = Path('styles.css')
          css = styles.read_text()
          old_core = '.model-core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:190px;height:190px;border-radius:50%;display:grid;place-content:center;text-align:center;background:radial-gradient(circle at 35% 25%,#4F4743,#171514);border:8px solid rgba(224,182,67,.38);box-shadow:0 0 0 16px rgba(255,255,255,.04)}'
          new_core = '.model-core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:190px;height:190px;border-radius:50%;display:grid;place-content:center;text-align:center;background:radial-gradient(circle at 35% 25%,#4F4743,#171514);border:8px solid rgba(224,182,67,.38);box-shadow:0 0 0 16px rgba(255,255,255,.04);box-sizing:border-box;padding:0 14px;overflow:hidden;z-index:2}'
          old_state = '.model-core b{font-family:var(--display-font);font-size:1.85rem}'
          new_state = '.model-core b{font-family:var(--display-font);font-size:clamp(1.18rem,2.1vw,1.55rem);line-height:.98;letter-spacing:-.035em;white-space:nowrap}'
          old_detail = '.model-core small{font-size:.67rem;padding:0 17px}'
          new_detail = '.model-core small{font-size:.67rem;line-height:1.35;padding:0 8px}'
          old_intervention = '.intervention-path{position:absolute;left:50%;top:66%;height:82px;border-left:1px dashed var(--brand-secondary);font-size:.58rem;color:var(--brand-secondary);letter-spacing:.1em}.intervention-path span{position:absolute;top:62px;left:8px;white-space:nowrap}'
          for old in (old_core, old_state, old_detail, old_intervention):
              assert css.count(old) == 1, f'Expected exact CSS source once: {old[:50]}'
          css = css.replace(old_core, new_core).replace(old_state, new_state).replace(old_detail, new_detail).replace(old_intervention, '')
          styles.write_text(css)

          evidence_path = Path('audit-evidence.json')
          evidence = json.loads(evidence_path.read_text())
          evidence['latest_regression_qa'] = {
            'date': '2026-07-12',
            'defect': 'Reliability Interlock dynamic-state and OWNER ACTION text overlap',
            'root_cause': 'Fixed-position annotation shared the gate-04 region, while the longest dynamic state label exceeded the fixed core width.',
            'repair': 'Removed the redundant in-stage annotation and added responsive contained typography with explicit core clipping and stacking.',
            'routes_tested': ['index.html','resume.html','cover-letter.html','interview-brief.html','120-day-plan.html','reliability-contract.html'],
            'viewports': ['1440x900','1280x800','768x1024','390x844','1190x1354 reported regression viewport'],
            'states_tested': ['run','observe','hold','recover'],
            'interaction_checks': ['sequence state changes','scenario click','scenario keyboard navigation','mobile navigation'],
            'quality_checks': ['no horizontal page overflow','no console warnings or errors','no broken local images in test harness','no duplicate IDs','document brand header geometry','reciprocal document navigation','PDF and Print controls','reduced-motion behavior'],
            'result': 'passed in local Chromium render QA before commit'
          }
          evidence_path.write_text(json.dumps(evidence, indent=2) + '\n')

          completion = Path('campaign-completion-audit.md')
          audit = completion.read_text()
          note = '''\n## Interlock regression repair - 2026-07-12\n\n- Reproduced the reported `RECOVERING` and `OWNER ACTION` overlaps with bounding-box assertions.\n- Removed the redundant annotation that occupied the gate-04 region.\n- Made dynamic core-state typography responsive, contained, and layered above the signal track.\n- Re-ran all six routes at desktop, laptop, tablet, mobile, and reduced-motion settings.\n- Verified all four interlock states, scenario click/keyboard behavior, mobile navigation, document actions, reciprocal navigation, and console health.\n- Result: all available local render and interaction checks passed.\n'''
          if '## Interlock regression repair - 2026-07-12' not in audit:
              completion.write_text(audit.rstrip() + '\n' + note)
          PY

      - name: Verify repaired source
        shell: bash
        run: |
          set -euo pipefail
          ! grep -q 'OWNER ACTION' index.html
          grep -q 'font-size:clamp(1.18rem,2.1vw,1.55rem)' styles.css
          grep -q 'overflow:hidden;z-index:2' styles.css
          grep -q 'latest_regression_qa' audit-evidence.json

      - name: Commit repair to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f .github/workflows/fix-interlock-overlap.yml
          git add index.html styles.css audit-evidence.json campaign-completion-audit.md
          git commit -m 'Fix Reliability Interlock text overlap and record full-site QA'
          git push origin main
